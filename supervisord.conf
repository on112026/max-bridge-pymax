; supervisord.conf для max-bridge-pymax (этап 2).
; Внутри контейнера крутятся 3 процесса:
;   api — FastAPI-приложение (uvicorn, порт 8000)
;   bot — aiogram-бот
;   max — PyMax-клиент + sender loop
;
; supervisord читает /etc/supervisor/supervisord.conf и инклюдит /etc/supervisor/conf.d/*.conf.
; Этот файл кла-дется в /etc/supervisor/supervisord.conf (см. CMD в Dockerfile).

[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid
loglevel=info

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:api]
command=python -m api.run
directory=/app
autostart=true
autorestart=true
startsecs=5
startretries=10
stopasgroup=true
killasgroup=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONPATH="/app:/app/shared:/app/api:/app/vendor"

[program:bot]
command=python -m bot.run
directory=/app
autostart=true
autorestart=true
startsecs=5
startretries=10
stopasgroup=true
killasgroup=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONPATH="/app:/app/shared:/app/bot:/app/vendor"

[program:max]
command=python -m max.run
directory=/app
autostart=true
autorestart=true
startsecs=10
startretries=10
stopasgroup=true
killasgroup=true
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONPATH="/app:/app/shared:/app/max:/app/vendor"

[group:bridge]
programs=api,bot,max
priority=999